name: flowlog
description: 极简流水账日记 — 睡前30秒完成记录
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.6.1

  # 路由
  go_router: ^14.8.1

  # 本地数据库
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.1

  # 工具
  uuid: ^4.5.1
  intl: ^0.20.2

  # UI
  table_calendar: ^3.1.3
  image_picker: ^1.1.2
  flutter_keyboard_visibility: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
